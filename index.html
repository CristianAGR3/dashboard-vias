<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Vias</title>

  <link rel="stylesheet" href="/styles.css">
</head>

<body>

  <header class="topbar">
    <div>
      <p class="eyebrow">Dashboard</p>
      <h1>Control de inventario y movimientos</h1>
    </div>

    <button id="refreshBtn"
            class="icon-button"
            title="Actualizar datos">
      Actualizar
    </button>
  </header>

  <!-- TABS -->
  <nav class="tabs" aria-label="Secciones">

    <button class="tab active"
            data-tab="inventario">
      Inventario
    </button>

    <button class="tab"
            data-tab="movimientos">
      Movimientos
    </button>

    <button class="tab"
            data-tab="proveedores">
      Proveedores
    </button>

    <button class="tab"
            data-tab="duplicados">
      Duplicados
    </button>

    <!-- NUEVO -->
    <button class="tab"
            data-tab="busqueda">
      Busqueda avanzada
    </button>

  </nav>

  <main>

    <!-- INVENTARIO -->
    <section id="inventario" class="panel active">

      <div class="grid two">

        <section class="surface">
          <h2>Buscar material</h2>

          <input id="inventorySearch"
                 class="input"
                 placeholder="Codigo o descripcion">

          <div id="inventoryResults"
               class="results"></div>
        </section>

        <section class="surface">
          <h2>Mayor movimiento PD, LG, RT</h2>

          <div id="topMaterials"
               class="table-wrap"></div>
        </section>

      </div>
    </section>

    <!-- MOVIMIENTOS -->
    <section id="movimientos" class="panel">

      <div class="grid two">

        <section class="surface">
          <h2>Historial por codigo</h2>

          <input id="movementSearch"
                 class="input"
                 placeholder="Codigo del material">

          <div id="movementResults"
               class="table-wrap"></div>
        </section>

        <section class="surface">
          <h2>Razones predominantes</h2>

          <div id="reasonBars"
               class="bars"></div>
        </section>

      </div>
    </section>

    <!-- PROVEEDORES -->
    <section id="proveedores" class="panel">

      <div class="grid two">

        <section class="surface">
          <h2>Recepcion por proveedor</h2>

          <div id="providerBars"
               class="bars"></div>
        </section>

        <section class="surface">
          <h2>Entradas por proveedor</h2>

          <select id="providerSelect"
                  class="input"></select>

          <div id="providerEntries"
               class="table-wrap"></div>
        </section>

      </div>
    </section>

    <!-- DUPLICADOS -->
    <section id="duplicados" class="panel">

      <section class="surface">

        <h2>Duplicados detectados</h2>

        <input id="duplicateSearch"
               class="input"
               placeholder="Filtrar por codigo, ticket o razon">

        <div id="duplicatesTable"
             class="table-wrap"></div>

      </section>

    </section>

    <!-- NUEVO BUSCADOR AVANZADO -->
    <section id="busqueda" class="panel">

      <section class="surface">

        <h2>Busqueda avanzada</h2>

        <div class="filters-grid">

          <input id="filterCodigo"
                 class="input"
                 placeholder="Codigo">

          <input id="filterDescripcion"
                 class="input"
                 placeholder="Descripcion">

          <input id="filterTicket"
                 class="input"
                 placeholder="Ticket">

          <input id="filterProveedor"
                 class="input"
                 placeholder="Proveedor">

          <select id="filterRazon"
                  class="input">

            <option value="">
              Todas las razones
            </option>

          </select>

          <select id="filterMovimiento"
                  class="input">

            <option value="">
              Todos los movimientos
            </option>

            <option value="ENTRADA">
              Entrada
            </option>

            <option value="SALIDA">
              Salida
            </option>

          </select>

          <input id="filterFechaInicio"
                 type="date"
                 class="input">

          <input id="filterFechaFin"
                 type="date"
                 class="input">

          <button id="advancedSearchBtn"
                  class="primary-button">
            Buscar
          </button>

        </div>

        <!-- KPIs -->
        <div class="kpi-grid">

          <div class="kpi-card">
            <span>Resultados</span>
            <strong id="kpiResultados">0</strong>
          </div>

          <div class="kpi-card">
            <span>Cantidad total</span>
            <strong id="kpiCantidad">0</strong>
          </div>

          <div class="kpi-card">
            <span>Tickets unicos</span>
            <strong id="kpiTickets">0</strong>
          </div>

        </div>

        <div id="advancedResults"
             class="table-wrap"></div>

      </section>

    </section>

  </main>

  <footer id="status"></footer>

  <script src="/app.js"></script>

</body>
</html>
