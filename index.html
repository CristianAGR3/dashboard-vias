<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard Vias</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Dashboard</p>
        <h1>Control de inventario y movimientos</h1>
      </div>
      <div class="topbar-actions">
        <button id="themeBtn" class="icon-button" type="button" title="Cambiar modo claro u oscuro">Modo oscuro</button>
        <button id="refreshBtn" class="icon-button" type="button" title="Actualizar datos">Actualizar</button>
      </div>
    </header>

    <nav class="tabs" aria-label="Secciones">
      <button class="tab active" data-tab="inventario">Inventario</button>
      <button class="tab" data-tab="movimientos">Movimientos</button>
      <button class="tab" data-tab="busqueda">Busqueda avanzada</button>
      <button class="tab" data-tab="proveedores">Proveedores</button>
      <button class="tab" data-tab="duplicados">Duplicados</button>
      <button class="tab" data-tab="mermas">Mermas</button>
    </nav>

    <main>
      <section id="inventario" class="panel active">
        <div class="grid two">
          <section class="surface">
            <h2>Buscar material</h2>
            <input id="inventorySearch" class="input" placeholder="Codigo o descripcion">
            <div id="inventoryResults" class="results"></div>
          </section>
          <section class="surface">
            <h2>Mayor movimiento PD, LG, RT</h2>
            <div id="topMaterials" class="table-wrap"></div>
          </section>
        </div>
      </section>

      <section id="movimientos" class="panel">
        <div class="grid two">
          <section class="surface">
            <h2>Historial por codigo</h2>
            <input id="movementSearch" class="input" placeholder="Codigo del material">
            <div id="movementResults" class="table-wrap"></div>
          </section>
          <section class="surface">
            <h2>Razones predominantes</h2>
            <div id="reasonBars" class="bars"></div>
          </section>
        </div>
      </section>

      <section id="busqueda" class="panel">
        <section class="surface">
          <h2>Buscar movimientos</h2>
          <div class="filters">
            <input id="advancedTicket" class="input" placeholder="Ticket o factura">
            <input id="advancedText" class="input" placeholder="Codigo, descripcion o razon">
            <select id="advancedPreset" class="input">
              <option value="all">Todas las fechas</option>
              <option value="today">Movimientos de hoy</option>
              <option value="yesterday">Movimientos de ayer</option>
              <option value="last7">Ultimos 7 dias</option>
              <option value="thisMonth">Este mes</option>
              <option value="custom">Rango personalizado</option>
            </select>
            <input id="advancedFrom" class="input" type="date">
            <input id="advancedTo" class="input" type="date">
            <select id="advancedType" class="input">
              <option value="">Entrada y salida</option>
              <option value="Entrada">Solo entradas</option>
              <option value="Salida">Solo salidas</option>
            </select>
            <select id="advancedReason" class="input">
              <option value="">Todas las razones</option>
            </select>
          </div>
          <div id="advancedSummary" class="summary-strip"></div>
          <div id="advancedResults" class="table-wrap"></div>
        </section>
      </section>

      <section id="proveedores" class="panel">
        <div class="grid two">
          <section class="surface">
            <h2>Recepcion por proveedor</h2>
            <div id="providerBars" class="bars"></div>
          </section>
          <section class="surface">
            <h2>Entradas por proveedor</h2>
            <select id="providerSelect" class="input"></select>
            <div id="providerEntries" class="table-wrap"></div>
          </section>
        </div>
      </section>

      <section id="duplicados" class="panel">
        <section class="surface">
          <h2>Duplicados detectados</h2>
          <input id="duplicateSearch" class="input" placeholder="Filtrar por codigo, ticket o razon">
          <div id="duplicatesTable" class="table-wrap"></div>
        </section>
      </section>

      <section id="mermas" class="panel">
        <section class="surface soon">
          <p class="eyebrow">Mermas</p>
          <h2>Proximamente</h2>
        </section>
      </section>
    </main>

    <footer id="status"></footer>
    <script src="/app.js"></script>
  </body>
</html>
